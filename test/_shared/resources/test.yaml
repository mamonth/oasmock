    get:
      responses:
        '200':
          description: OK
  /not-in-schema:
    get:
      responses:
        '200':
          description: OK
  /structured:
    get:
      responses:
        '200':
          description: OK
  /echo:
    post:
      responses:
        '200':
          description: OK
  /body:
    post:
      responses:
        '200':
          description: OK
  /env:
    get:
      responses:
        '200':
          description: OK
  /jwt:
    get:
      responses:
        '200':
          description: OK