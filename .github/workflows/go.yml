name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout 5m

    - name: Coverage Check
      run: ./scripts/check-coverage.sh 70

    - name: Spec Coverage Check
      run: |
        python3 scripts/analyze_scenario_coverage.py --detailed --output coverage_report.md
        COVERAGE=$(python3 scripts/analyze_scenario_coverage.py --coverage-only)
        if (( $(echo "$COVERAGE < 0.999" | bc -l) )); then
          echo "ERROR: Spec coverage ${COVERAGE} is below required 100%"
          exit 1
        fi

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage_report.md